<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Mochi | Calorie Calculator</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Quicksand", sans-serif;
                background-color: #fff5f7;
            }
            .mochi-card {
                background: white;
                border-radius: 24px;
                box-shadow: 0 10px 20px rgba(255, 182, 193, 0.2);
            }
            .input-style {
                background: #fff0f3;
                border: none;
                border-radius: 15px;
                padding: 12px;
                width: 100%;
                outline-color: #ffb6c1;
            }
        </style>
    </head>
    <body class="p-6 min-h-screen flex flex-col items-center">
        <div class="max-w-md w-full">
            <a href="/" class="text-pink-400 font-bold mb-6 inline-block"
                >← Back to Home</a
            >

            <div class="mochi-card p-8">
                <h1 class="text-2xl font-bold text-pink-600 text-center mb-6">
                    Calorie Calculator 🍎
                </h1>

                <form action="/calories" method="POST" class="space-y-4">
                    <input
                        type="number"
                        name="age"
                        placeholder="Age"
                        class="input-style"
                        required
                    />
                    <input
                        type="number"
                        name="weight"
                        placeholder="Weight (kg)"
                        class="input-style"
                        required
                    />
                    <input
                        type="number"
                        name="height"
                        placeholder="Height (cm)"
                        class="input-style"
                        required
                    />

                    <select name="gender" class="input-style">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>

                    <select name="activity" class="input-style">
                        <option value="sedentary">Little to no exercise</option>
                        <option value="light">Light exercise</option>
                        <option value="moderate">Moderate exercise</option>
                        <option value="very_active">Hard exercise</option>
                    </select>

                    <button
                        type="submit"
                        class="w-full bg-pink-400 text-white font-bold py-3 rounded-2xl hover:bg-pink-500 transition"
                    >
                        Calculate with Mochi
                    </button>
                </form>

                {% if results %}
                <div class="mt-6 p-4 bg-pink-50 rounded-xl text-center">
                    <p class="text-pink-600 font-bold">
                        To maintain: {{ results[0] }} kcal
                    </p>
                    <p class="text-gray-500 text-sm">
                        To lose: {{ results[1] }} kcal | To gain: {{ results[2]
                        }} kcal
                    </p>
                </div>
                {% endif %}
            </div>
        </div>
    </body>
</html>
