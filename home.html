<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi Wellness Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #FFF5F7; }
        .mochi-card { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.2);
            transition: transform 0.2s ease;
        }
        .mochi-card:hover { transform: scale(1.02); }
        .pink-btn { background: #FFD1DC; color: #D65A7D; font-weight: 700; border-radius: 15px; }
        .pink-btn:hover { background: #FFC0CB; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto text-center mb-10">
        <div class="text-6xl mb-2 animate-bounce">🍡</div>
        <h1 class="text-3xl font-bold text-pink-600">Mochi Wellness</h1>
        <p class="text-gray-500 italic">"Welcome back! Let's check your stats."</p>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="mochi-card p-6 flex flex-col items-center text-center">
            <span class="text-4xl mb-4">⚖️</span>
            <h3 class="font-bold text-gray-700 text-lg">BMI Calculator</h3>
            <p class="text-sm text-gray-400 mb-6">Check your health ratio.</p>
            <a href="/bmi" class="pink-btn py-2 px-6 w-full text-center">Open</a>
        </div>

        <div class="mochi-card p-6 flex flex-col items-center text-center border-2 border-pink-100">
            <span class="text-4xl mb-4">🍎</span>
            <h3 class="font-bold text-gray-700 text-lg">Daily Calories</h3>
            <p class="text-sm text-gray-400 mb-6">Lose, gain, or maintain.</p>
            <a href="/calories" class="pink-btn py-2 px-6 w-full text-center">Open</a>
        </div>

        <div class="mochi-card p-6 flex flex-col items-center text-center">
            <span class="text-4xl mb-4">📅</span>
            <h3 class="font-bold text-gray-700 text-lg">Period Tracker</h3>
            <p class="text-sm text-gray-400 mb-6">Predict your next cycle.</p>
            <a href="/period" class="pink-btn py-2 px-6 w-full text-center">Open</a>
        </div>


      
    </main>

    <div class="max-w-4xl mx-auto mt-10 p-6 bg-pink-100 rounded-3xl border-2 border-dashed border-pink-300 text-center">
        <p class="text-pink-700 font-semibold">✨ Mochi's Tip of the Day:</p>
        <p class="text-pink-600">Drink a glass of water before every meal to stay hydrated!</p>
    </div>

</body>
</html>
